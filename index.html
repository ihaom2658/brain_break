<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Multitasking Dodge - Neon Professional</title>
    <meta name="description" content="극한의 멀티태스킹 능력을 시험하는 네온 닷지 게임">
    <style>
        :root { 
            --primary-color: #f1c40f; 
            --neon-mint: #0ff;
            --neon-pink: #f0f;
            --neon-green: #0f0;
            --neon-orange: #f80;
        }
        body { margin: 0; background-color: #000; font-family: 'Pretendard', sans-serif; color: white; overflow-x: hidden; }
        .overlay { width: 100%; min-height: 100vh; background: rgba(0,0,0,0.94); display: flex; flex-direction: column; align-items: center; padding-top: 60px; position: relative; z-index: 100; }
        .hidden { display: none !important; }
        
        .btn { padding: 15px 40px; font-size: 20px; cursor: pointer; font-weight: bold; border: none; border-radius: 8px; transition: 0.2s; color: white; margin: 10px; outline: none; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }
        
        #ranking-container { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 15px; width: 420px; margin-top: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .tab-menu { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #333; color: white; border: none; padding: 10px 22px; cursor: pointer; border-radius: 6px; font-size: 14px; }
        .tab-btn.active { background: var(--primary-color); color: #000; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 16px; }
        th, td { padding: 14px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .rank-1 { color: var(--primary-color); font-weight: bold; }

        #game-ui { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); font-size: 24px; z-index: 200; display: none; font-weight: bold; color: var(--neon-mint); text-align: center; width: 100%; }
        #countdown-text { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; font-weight: bold; color: var(--primary-color); z-index: 300; display: none; }
        
        canvas { position: fixed; top: 0; left: 0; z-index: 10; display: none; cursor: none; }
        #version-tag { position: fixed; bottom: 12px; right: 18px; font-size: 14px; color: rgba(255, 255, 255, 0.3); z-index: 500; }

        .content-section { max-width: 850px; width: 90%; margin: 60px 0; text-align: left; line-height: 2.0; color: #ccc; border-top: 1px solid #333; padding-top: 40px; }
        .content-section h2 { color: var(--primary-color); border-left: 5px solid var(--primary-color); padding-left: 15px; margin: 50px 0 25px; font-size: 28px; }
    </style>
</head>
<body>

<div id="countdown-text"></div>
<div id="game-ui">TIME: <span id="timer">0.0</span>s | STAGE: <span id="stage-val">1</span></div>
<div id="version-tag">Ver 1.2.2</div>

<canvas id="gameCanvas"></canvas>

<div id="main-menu" class="overlay">
    <h1 style="color: var(--neon-mint); font-size: 48px; letter-spacing: 4px; margin-bottom: 10px; text-shadow: 0 0 15px var(--neon-mint);">NEON DODGE</h1>
    <div class="btn-group">
        <button class="btn" style="background:#2ecc71" onclick="runGame('EASY')">EASY MODE</button>
        <button class="btn" style="background:#e74c3c" onclick="runGame('HARD')">HARD MODE</button>
    </div>
    
    <div id="ranking-container">
        <div class="tab-menu">
            <button class="tab-btn active" id="tab-EASY" onclick="loadRanking('EASY')">EASY RANK</button>
            <button class="tab-btn" id="tab-HARD" onclick="loadRanking('HARD')">HARD RANK</button>
        </div>
        <div id="ranking-list">데이터 로딩 중...</div>
    </div>

    <div class="content-section">
        <h2>멀티태스킹 닷지: 인지 능력의 한계를 넘어서</h2>
        <p>현대 게임 환경에서 멀티태스킹 능력은 필수적인 요소입니다. 단순히 하나에 집중하는 것을 넘어, 시각 정보의 분할 처리와 각기 다른 출력 장치의 독립적 제어는 게이머에게 정점의 실력을 부여합니다.</p>
        <p><strong>60초 이후부터는 각 구역이 순차적으로 LEVEL UP! 되며 극한의 난이도로 진입합니다.</strong></p>
    </div>
</div>

<div id="result-screen" class="overlay hidden">
    <h1 id="result-title">GAME OVER</h1>
    <h2 id="final-stats" style="color: var(--primary-color); font-size: 28px;">버틴 시간: 0.0s</h2>
    <input type="text" id="nickname" placeholder="닉네임 입력" maxlength="8" style="padding:12px; border-radius:8px; border:none; margin-bottom:15px; text-align:center; width:240px; font-size: 18px;">
    <button class="btn" id="save-btn" style="background:var(--primary-color); color:#000;">기록 등록</button>
    <button class="btn" style="background:#555;" onclick="location.reload()">다시 하기</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, orderBy, limit, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWvmTD7ZqrM8QS2jAtIoxyYw9zDghyyZo",
        authDomain: "dummy-server-ff1b9.firebaseapp.com",
        projectId: "dummy-server-ff1b9",
        storageBucket: "dummy-server-ff1b9.firebasestorage.app",
        messagingSenderId: "275700573811",
        appId: "1:275700573811:web:bb1290a5e5ec97a73cac06"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const timerEl = document.getElementById('timer');
    const stageValEl = document.getElementById('stage-val');

    let gameActive = false, score = 0, stage = 1, currentDiff = 'EASY';
    let p1 = { x: 0, y: 0 }, keys = {};
    let warnArea = 0; 
    let levelUpArea = 0;

    const GW = 800, GH = 600;
    let OX, OY;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        OX = (canvas.width - GW) / 2;
        OY = (canvas.height - GH) / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    window.loadRanking = async (diff) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === `tab-${diff}`));
        const listDiv = document.getElementById('ranking-list');
        listDiv.innerHTML = "로딩 중...";
        try {
            const q = query(collection(db, "dodge_rankings"), where("diff", "==", diff), orderBy("score", "desc"), limit(5));
            const snap = await getDocs(q);
            let html = "<table><tr><th>순위</th><th>닉네임</th><th>시간</th></tr>";
            let rank = 1;
            snap.forEach(doc => {
                const data = doc.data();
                html += `<tr class="${rank===1?'rank-1':''}"><td>${rank}</td><td>${data.name}</td><td>${data.score.toFixed(1)}s</td></tr>`;
                rank++;
            });
            listDiv.innerHTML = (rank === 1) ? "기록 없음" : html + "</table>";
        } catch(e) { listDiv.innerHTML = "로드 실패"; }
    };
    loadRanking('EASY');

    const area1 = {
        enemies: [],
        update() {
            let spawnRate = currentDiff === 'EASY' ? 0.01 : 0.02;
            let speedBase = currentDiff === 'EASY' ? 1.0 : 1.8;
            if(score > 60) { spawnRate *= 2.0; speedBase *= 1.5; }
            if(this.enemies.length < (score > 60 ? 6 : 3) && Math.random() < spawnRate) {
                this.enemies.push({x: OX + Math.random()*(GW/2 - 20) + 10, y: OY - 20, s: speedBase + Math.random()*1.0});
            }
            this.enemies.forEach(e => {
                e.y += e.s;
                if(Math.hypot(p1.x - e.x, p1.y - e.y) < 16) stopGame("AREA 1: 충돌!");
            });
            this.enemies = this.enemies.filter(e => e.y < OY + GH/2);
        },
        draw() {
            ctx.fillStyle = 'rgba(0, 255, 255, 0.08)';
            ctx.fillRect(OX, OY, GW/2, GH/2);
            ctx.fillStyle = '#0ff';
            this.enemies.forEach(e => ctx.fillRect(e.x-6, e.y-6, 12, 12));
            ctx.beginPath(); ctx.arc(p1.x, p1.y, 8, 0, Math.PI*2);
            ctx.fillStyle = '#0ff'; ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.stroke();
        }
    };

    const area2 = {
        px: 0, balls: [],
        init() { this.px = OX + GW * 0.75; this.balls = []; },
        update() {
            if(keys['KeyA'] && this.px > OX + GW/2 + 15) this.px -= 3;
            if(keys['KeyD'] && this.px < OX + GW - 15) this.px += 3;
            let spawnRate = currentDiff === 'EASY' ? 0.008 : 0.015;
            let speedBase = (currentDiff === 'EASY' ? 2.0 : 3.5) * 0.65;
            if(score > 70) { spawnRate *= 2.2; speedBase *= 1.4; }
            if(Math.random() < spawnRate) this.balls.push({x: OX + GW/2 + 10 + Math.random()*(GW/2 - 20), y: OY, s: speedBase});
            this.balls.forEach(b => {
                b.y += b.s;
                if(Math.abs(this.px - b.x) < 14 && Math.abs(OY + GH/2 - 30 - b.y) < 14) stopGame("AREA 2: 충돌!");
            });
            this.balls = this.balls.filter(b => b.y < OY + GH/2);
        },
        draw() {
            ctx.fillStyle = 'rgba(255, 0, 255, 0.05)';
            ctx.fillRect(OX + GW/2, OY, GW/2, GH/2);
            ctx.fillStyle = '#f0f';
            ctx.fillRect(this.px-10, OY + GH/2 - 35, 20, 20);
            this.balls.forEach(b => {
                ctx.beginPath(); ctx.arc(b.x, b.y, 7, 0, Math.PI*2); ctx.fill();
            });
        }
    };

    const area3 = {
        py: 0, v: 0, ground: true, obsX: 0,
        init() { this.py = OY + GH - 25; this.v = 0; this.ground = true; this.obsX = OX - 100; },
        update() {
            // 점프 메커니즘 개선 (중력 하향 및 점프력 최적화)
            if(keys['Space'] && this.ground) { this.v = -9.2; this.ground = false; }
            this.v += 0.32; // 중력 더 낮춤 (부드러운 낙하)
            this.py += this.v;
            if(this.py >= OY + GH - 25) { this.py = OY + GH - 25; this.v = 0; this.ground = true; }
            
            if(score > 22) { 
                // 장애물 오는 빈도 및 속도 최적화
                let moveSpeed = (currentDiff === 'EASY' ? 2.8 : 4.0);
                this.obsX += moveSpeed; 
                // 화면 오른쪽 끝까지 가지 않고 일정 거리 도달 시 왼쪽에서 재생성 (빈도 조절)
                if(this.obsX > OX + GW/2 + 100) this.obsX = OX - 50;
            } else { this.obsX = OX - 50; }
            
            const playerX = OX + GW/2 - 80;
            // 판정 크기 축소 (18 -> 14)
            if(Math.abs(this.obsX - playerX) < 14 && this.py > OY + GH - 40) stopGame("AREA 3: 충돌!");
        },
        draw() {
            let darkness = 0;
            if(score >= 80) darkness = Math.min(1, (score - 80) / 5);
            
            // 구역 배경
            ctx.fillStyle = `rgba(0, 255, 0, ${0.05 * (1 - darkness)})`;
            ctx.fillRect(OX, OY + GH/2, GW/2, GH/2);
            
            // 암전 효과 (85초 이후에는 내부의 모든 것이 검정색이 됨)
            if(darkness >= 1) {
                ctx.fillStyle = "#000";
                ctx.fillRect(OX, OY + GH/2, GW/2, GH/2);
            } else {
                // 캐릭터
                ctx.fillStyle = `rgba(0, 255, 0, ${1 - darkness})`;
                ctx.fillRect(OX + GW/2 - 90, this.py-20, 20, 20);
                // 장애물
                ctx.fillStyle = `rgba(255, 255, 0, ${1 - darkness})`;
                ctx.fillRect(this.obsX, OY + GH - 40, 15, 40);
            }
        }
    };

    const area4 = {
        g: 0,
        update() {
            let increase = (currentDiff === 'EASY' ? 0.15 : 0.30);
            if(score > 90) increase *= 1.6;
            this.g += increase;
            if(this.g >= 100) stopGame("AREA 4: 폭발!");
        },
        draw() {
            ctx.fillStyle = 'rgba(255, 136, 0, 0.05)';
            ctx.fillRect(OX + GW/2, OY + GH/2, GW/2, GH/2);
            const bx = OX + GW * 0.62, by = OY + GH * 0.75;
            ctx.fillStyle = '#333'; ctx.fillRect(bx, by, 150, 25);
            ctx.fillStyle = this.g > 80 ? '#f00' : '#f80';
            ctx.fillRect(bx, by, this.g * 1.5, 25);
        }
    };

    function drawInfo(areaNum, text) {
        ctx.fillStyle = "rgba(241, 196, 15, 0.9)";
        ctx.font = "bold 22px Pretendard";
        ctx.textAlign = "center";
        let tx, ty;
        if(areaNum === 1) { tx = OX + GW/4; ty = OY + GH/4; }
        if(areaNum === 2) { tx = OX + GW*0.75; ty = OY + GH/4; }
        if(areaNum === 3) { tx = OX + GW/4; ty = OY + GH*0.75; }
        if(areaNum === 4) { tx = OX + GW*0.75; ty = OY + GH*0.75; }
        ctx.fillText(text, tx, ty);
    }

    window.addEventListener('keydown', e => { 
        keys[e.code] = true; 
        if(e.code === 'Escape' && gameActive) stopGame("중단"); 
    });
    window.addEventListener('keyup', e => keys[e.code] = false);
    window.addEventListener('mousemove', e => {
        if(!gameActive) return;
        p1.x += e.movementX; p1.y += e.movementY;
        p1.x = Math.max(OX + 12, Math.min(OX + GW/2 - 12, p1.x));
        p1.y = Math.max(OY + 12, Math.min(OY + GH/2 - 12, p1.y));
    });
    window.addEventListener('mousedown', e => {
        if(!gameActive) return;
        const rect = canvas.getBoundingClientRect();
        const rx = e.clientX - rect.left;
        const ry = e.clientY - rect.top;
        if(rx > GW/2 && ry > GH/2) {
            let decrease = (score > 90) ? 12.5 : 25;
            area4.g = Math.max(0, area4.g - decrease);
        }
    });

    window.runGame = (diff) => {
        currentDiff = diff;
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('countdown-text').style.display = 'block';
        let count = 3;
        const cd = setInterval(() => {
            document.getElementById('countdown-text').innerText = count <= 0 ? "GO!" : count;
            if(count < 0) {
                clearInterval(cd);
                document.getElementById('countdown-text').style.display = 'none';
                canvas.requestPointerLock();
                startGame();
            }
            count--;
        }, 800);
    };

    function startGame() {
        gameActive = true; score = 0; stage = 1;
        p1 = { x: OX + GW/4, y: OY + GH/4 };
        area1.enemies = []; area2.init(); area3.init(); area4.g = 0;
        canvas.style.display = 'block';
        document.getElementById('game-ui').style.display = 'block';
        animate();
    }

    function stopGame(reason) {
        if(!gameActive) return;
        gameActive = false;
        document.exitPointerLock();
        canvas.style.display = 'none';
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-stats').innerText = `시간: ${score.toFixed(1)}s (${reason})`;
    }

    function animate() {
        if(!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        score += 1/60;
        timerEl.innerText = score.toFixed(1);

        warnArea = 0;
        if(score >= 8 && score < 10) warnArea = 2;
        if(score >= 18 && score < 20) warnArea = 3;
        if(score >= 28 && score < 30) warnArea = 4;

        levelUpArea = 0;
        if(score >= 60 && score < 61) levelUpArea = 1;
        if(score >= 70 && score < 71) levelUpArea = 2;
        if(score >= 80 && score < 81) levelUpArea = 3;
        if(score >= 90 && score < 91) levelUpArea = 4;

        if(score > 30) stage = 4; else if(score > 20) stage = 3; else if(score > 10) stage = 2;
        stageValEl.innerText = stage;

        area1.update(); area1.draw();
        if(stage >= 2) { area2.update(); area2.draw(); }
        if(stage >= 3) { area3.update(); area3.draw(); }
        if(stage >= 4) { area4.update(); area4.draw(); }

        if(warnArea === 2) drawInfo(2, "잠시 후 시작: A, D 이동");
        if(warnArea === 3) drawInfo(3, "잠시 후 시작: SPACE 점프");
        if(warnArea === 4) drawInfo(4, "잠시 후 시작: 클릭 해제");
        if(levelUpArea > 0) drawInfo(levelUpArea, "LEVEL UP!");

        ctx.strokeStyle = '#444'; ctx.lineWidth = 2;
        ctx.strokeRect(OX, OY, GW, GH);
        ctx.beginPath(); ctx.moveTo(OX + GW/2, OY); ctx.lineTo(OX + GW/2, OY + GH); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(OX, OY + GH/2); ctx.lineTo(OX + GW, OY + GH/2); ctx.stroke();

        requestAnimationFrame(animate);
    }

    document.getElementById('save-btn').onclick = async () => {
        const nick = document.getElementById('nickname').value.trim() || "익명";
        try {
            await addDoc(collection(db, "dodge_rankings"), {
                diff: currentDiff, name: nick, score: score, timestamp: serverTimestamp()
            });
            location.reload();
        } catch (e) { alert("저장 실패"); }
    };
</script>
</body>
</html>
