<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Multitasking Dodge - Neon Professional</title>
    <style>
        :root { 
            --primary-color: #f1c40f; 
            --neon-mint: #0ff;
        }
        body { margin: 0; background-color: #000; font-family: 'Pretendard', sans-serif; color: white; overflow: hidden; }
        .overlay { width: 100%; min-height: 100vh; background: rgba(0,0,0,0.94); display: flex; flex-direction: column; align-items: center; padding-top: 60px; position: relative; z-index: 100; }
        .hidden { display: none !important; }
        .btn { padding: 15px 40px; font-size: 20px; cursor: pointer; font-weight: bold; border: none; border-radius: 8px; transition: 0.2s; color: white; margin: 10px; outline: none; }
        
        /* 볼륨 컨트롤 스타일 */
        #volume-control {
            position: fixed; bottom: 40px; right: 20px; z-index: 1000;
            background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px;
            display: flex; align-items: center; gap: 10px; border: 1px solid #444;
        }
        #volume-slider { cursor: pointer; accent-color: var(--primary-color); }

        /* 기존 스타일 유지 */
        #ranking-container { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 15px; width: 420px; margin-top: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .tab-menu { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #333; color: white; border: none; padding: 10px 22px; cursor: pointer; border-radius: 6px; font-size: 14px; }
        .tab-btn.active { background: var(--primary-color); color: #000; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th, td { padding: 14px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        #game-ui { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); font-size: 24px; z-index: 200; display: none; font-weight: bold; color: var(--neon-mint); text-align: center; width: 100%; }
        #countdown-text { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; font-weight: bold; color: var(--primary-color); z-index: 300; display: none; }
        canvas { position: fixed; top: 0; left: 0; z-index: 10; display: none; cursor: none; }
        #version-tag { position: fixed; bottom: 12px; right: 18px; font-size: 12px; color: rgba(255, 255, 255, 0.3); z-index: 500; }
    </style>
</head>
<body>

<div id="countdown-text"></div>
<div id="game-ui">TIME: <span id="timer">0.0</span>s | STAGE: <span id="stage-val">1</span></div>

<div id="volume-control">
    <span>🔊</span>
    <input type="range" id="volume-slider" min="0" max="100" value="30">
</div>

<div id="version-tag">Ver 1.2.5</div>
<canvas id="gameCanvas"></canvas>

<div id="main-menu" class="overlay">
    <h1 style="color: var(--neon-mint); font-size: 48px; letter-spacing: 4px; margin-bottom: 10px; text-shadow: 0 0 15px var(--neon-mint);">NEON DODGE</h1>
    <div class="btn-group">
        <button class="btn" style="background:#2ecc71" onclick="runGame('EASY')">EASY MODE</button>
        <button class="btn" style="background:#e74c3c" onclick="runGame('HARD')">HARD MODE</button>
    </div>
    
    <div id="ranking-container">
        <div class="tab-menu">
            <button class="tab-btn active" id="tab-EASY" onclick="loadRanking('EASY')">EASY RANK</button>
            <button class="tab-btn" id="tab-HARD" onclick="loadRanking('HARD')">HARD RANK</button>
        </div>
        <div id="ranking-list">데이터 로딩 중...</div>
    </div>
</div>

<div id="result-screen" class="overlay hidden">
    <h1 id="result-title">GAME OVER</h1>
    <h2 id="final-stats" style="color: var(--primary-color); font-size: 28px;">버틴 시간: 0.0s</h2>
    <input type="text" id="nickname" placeholder="닉네임 입력" maxlength="8" style="padding:12px; border-radius:8px; border:none; margin-bottom:15px; text-align:center; width:240px; font-size: 18px;">
    <button class="btn" id="save-btn" style="background:var(--primary-color); color:#000;">기록 등록</button>
    <button class="btn" style="background:#555;" onclick="location.reload()">다시 하기</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, orderBy, limit, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- 개선된 BGM 시스템 ---
    let audioCtx, masterGain, musicInterval;
    const volSlider = document.getElementById('volume-slider');

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.connect(audioCtx.destination);
        updateVolume();
    }

    function updateVolume() {
        if (masterGain) masterGain.gain.setTargetAtTime(volSlider.value / 400, audioCtx.currentTime, 0.05);
    }
    volSlider.oninput = updateVolume;

    function playNote(freq, type, duration, volume = 1, detune = 0) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.detune.setValueAtTime(detune, audioCtx.currentTime);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(masterGain);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    let beat = 0;
    function startBGM() {
        if (musicInterval) return;
        musicInterval = setInterval(() => {
            if (!gameActive) return;
            const step = beat % 16;
            
            // Stage 1: 베이스 비트 (4/4 박자)
            if (step % 4 === 0) playNote(55, 'triangle', 0.5, 0.8); // 킥 느낌
            if (step % 8 === 4) playNote(110, 'square', 0.1, 0.3); // 스네어 느낌

            // Stage 2: 코드 반주 레이어
            if (stage >= 2 && step % 2 === 0) {
                const chord = [220, 261, 329]; // Am
                playNote(chord[step % 3], 'sawtooth', 0.2, 0.15);
            }

            // Stage 3: 빠른 아르페지오
            if (stage >= 3) {
                const arp = [440, 523, 659, 783];
                playNote(arp[step % 4], 'sine', 0.1, 0.2);
            }

            // Stage 4: 긴박한 고음 리드
            if (stage >= 4 && step % 4 === 2) {
                playNote(880, 'square', 0.3, 0.1, Math.random() * 20);
            }

            beat++;
        }, 150); // BPM 약 100
    }

    function stopBGM() {
        clearInterval(musicInterval);
        musicInterval = null;
        if (masterGain) masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
    }

    // --- 게임 로직 (기존 로직 유지) ---
    const firebaseConfig = {
        apiKey: "AIzaSyCWvmTD7ZqrM8QS2jAtIoxyYw9zDghyyZo",
        authDomain: "dummy-server-ff1b9.firebaseapp.com",
        projectId: "dummy-server-ff1b9",
        storageBucket: "dummy-server-ff1b9.firebasestorage.app",
        messagingSenderId: "275700573811",
        appId: "1:275700573811:web:bb1290a5e5ec97a73cac06"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const timerEl = document.getElementById('timer');
    const stageValEl = document.getElementById('stage-val');

    let gameActive = false, score = 0, stage = 1, currentDiff = 'EASY';
    let p1 = { x: 0, y: 0 }, keys = {};
    const GW = 800, GH = 600;
    let OX, OY;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        OX = (canvas.width - GW) / 2;
        OY = (canvas.height - GH) / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    // 랭킹 로드/저장 로직은 이전과 동일 (생략하지 않고 코드에 포함)
    window.loadRanking = async (diff) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === `tab-${diff}`));
        const listDiv = document.getElementById('ranking-list');
        listDiv.innerHTML = "로딩 중...";
        try {
            const q = query(collection(db, "dodge_rankings"), where("diff", "==", diff), orderBy("score", "desc"), limit(5));
            const snap = await getDocs(q);
            let html = "<table><tr><th>순위</th><th>닉네임</th><th>시간</th></tr>";
            let rank = 1;
            snap.forEach(doc => {
                const data = doc.data();
                html += `<tr><td>${rank}</td><td>${data.name}</td><td>${data.score.toFixed(1)}s</td></tr>`;
                rank++;
            });
            listDiv.innerHTML = (rank === 1) ? "기록 없음" : html + "</table>";
        } catch(e) { listDiv.innerHTML = "로드 실패"; }
    };
    loadRanking('EASY');

    // 영역별 객체 (area1, area2, area3, area4) 정의는 기존 코드와 동일
    const area1 = {
        enemies: [],
        update() {
            let spawnRate = currentDiff === 'EASY' ? 0.01 : 0.02;
            let speedBase = currentDiff === 'EASY' ? 1.0 : 1.8;
            if(score > 60) { spawnRate *= 2; speedBase *= 1.5; }
            if(this.enemies.length < (score > 60 ? 6 : 3) && Math.random() < spawnRate) {
                this.enemies.push({x: OX + Math.random()*(GW/2 - 20) + 10, y: OY - 20, s: speedBase + Math.random()*1.0});
            }
            this.enemies.forEach(e => {
                e.y += e.s;
                if(Math.hypot(p1.x - e.x, p1.y - e.y) < 16) stopGame("AREA 1: 충돌!");
            });
            this.enemies = this.enemies.filter(e => e.y < OY + GH/2);
        },
        draw() {
            ctx.fillStyle = 'rgba(0, 255, 255, 0.08)'; ctx.fillRect(OX, OY, GW/2, GH/2);
            ctx.fillStyle = '#0ff'; this.enemies.forEach(e => ctx.fillRect(e.x-6, e.y-6, 12, 12));
            ctx.beginPath(); ctx.arc(p1.x, p1.y, 8, 0, Math.PI*2); ctx.fillStyle = '#0ff'; ctx.fill();
        }
    };
    const area2 = {
        px: 0, balls: [],
        init() { this.px = OX + GW * 0.75; this.balls = []; },
        update() {
            if(keys['KeyA'] && this.px > OX + GW/2 + 15) this.px -= 3;
            if(keys['KeyD'] && this.px < OX + GW - 15) this.px += 3;
            let spawnRate = currentDiff === 'EASY' ? 0.008 : 0.015;
            if(Math.random() < spawnRate) this.balls.push({x: OX + GW/2 + 10 + Math.random()*(GW/2 - 20), y: OY, s: 2.5});
            this.balls.forEach(b => {
                b.y += b.s;
                if(Math.abs(this.px - b.x) < 14 && Math.abs(OY + GH/2 - 30 - b.y) < 14) stopGame("AREA 2: 충돌!");
            });
            this.balls = this.balls.filter(b => b.y < OY + GH/2);
        },
        draw() {
            ctx.fillStyle = 'rgba(255, 0, 255, 0.05)'; ctx.fillRect(OX + GW/2, OY, GW/2, GH/2);
            ctx.fillStyle = '#f0f'; ctx.fillRect(this.px-10, OY + GH/2 - 35, 20, 20);
            this.balls.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 7, 0, Math.PI*2); ctx.fill(); });
        }
    };
    const area3 = {
        py: 0, v: 0, ground: true, obsX: 0,
        init() { this.py = OY + GH - 25; this.v = 0; this.obsX = OX - 50; },
        update() {
            if(keys['Space'] && this.ground) { this.v = -9; this.ground = false; }
            this.v += 0.3; this.py += this.v;
            if(this.py >= OY + GH - 25) { this.py = OY + GH - 25; this.v = 0; this.ground = true; }
            if(score > 22) {
                this.obsX += (currentDiff === 'EASY' ? 3 : 4.5);
                if(this.obsX > OX + GW/2 + 100) this.obsX = OX - 50;
            }
            if(Math.abs(this.obsX - (OX + GW/2 - 80)) < 15 && this.py > OY + GH - 40) stopGame("AREA 3: 충돌!");
        },
        draw() {
            ctx.fillStyle = 'rgba(0, 255, 0, 0.05)'; ctx.fillRect(OX, OY + GH/2, GW/2, GH/2);
            ctx.fillStyle = '#0f0'; ctx.fillRect(OX + GW/2 - 90, this.py-20, 20, 20);
            ctx.fillStyle = '#ff0'; ctx.fillRect(this.obsX, OY + GH - 40, 15, 40);
        }
    };
    const area4 = {
        g: 0,
        update() {
            this.g += (currentDiff === 'EASY' ? 0.15 : 0.25);
            if(this.g >= 100) stopGame("AREA 4: 폭발!");
        },
        draw() {
            ctx.fillStyle = 'rgba(255, 136, 0, 0.05)'; ctx.fillRect(OX + GW/2, OY + GH/2, GW/2, GH/2);
            ctx.fillStyle = '#333'; ctx.fillRect(OX + GW * 0.62, OY + GH * 0.75, 150, 25);
            ctx.fillStyle = '#f80'; ctx.fillRect(OX + GW * 0.62, OY + GH * 0.75, this.g * 1.5, 25);
        }
    };

    window.runGame = (diff) => {
        initAudio();
        currentDiff = diff;
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('countdown-text').style.display = 'block';
        let count = 3;
        const cd = setInterval(() => {
            document.getElementById('countdown-text').innerText = count <= 0 ? "GO!" : count;
            if(count < 0) {
                clearInterval(cd);
                document.getElementById('countdown-text').style.display = 'none';
                canvas.requestPointerLock();
                startGame();
            }
            count--;
        }, 800);
    };

    function startGame() {
        gameActive = true; score = 0; stage = 1; beat = 0;
        p1 = { x: OX + GW/4, y: OY + GH/4 };
        area2.init(); area3.init(); area4.g = 0;
        canvas.style.display = 'block';
        document.getElementById('game-ui').style.display = 'block';
        startBGM();
        animate();
    }

    function stopGame(reason) {
        if(!gameActive) return;
        gameActive = false;
        stopBGM();
        document.exitPointerLock();
        canvas.style.display = 'none';
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-stats').innerText = `시간: ${score.toFixed(1)}s (${reason})`;
    }

    function animate() {
        if(!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        score += 1/60;
        timerEl.innerText = score.toFixed(1);
        if(score > 30) stage = 4; else if(score > 20) stage = 3; else if(score > 10) stage = 2; else stage = 1;
        stageValEl.innerText = stage;

        area1.update(); area1.draw();
        if(stage >= 2) { area2.update(); area2.draw(); }
        if(stage >= 3) { area3.update(); area3.draw(); }
        if(stage >= 4) { area4.update(); area4.draw(); }

        ctx.strokeStyle = '#444';
        ctx.strokeRect(OX, OY, GW, GH);
        ctx.beginPath(); ctx.moveTo(OX + GW/2, OY); ctx.lineTo(OX + GW/2, OY + GH); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(OX, OY + GH/2); ctx.lineTo(OX + GW, OY + GH/2); ctx.stroke();
        requestAnimationFrame(animate);
    }

    // 마우스 이벤트 등 유지...
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
    window.addEventListener('mousemove', e => {
        if(!gameActive) return;
        p1.x = Math.max(OX + 12, Math.min(OX + GW/2 - 12, p1.x + e.movementX));
        p1.y = Math.max(OY + 12, Math.min(OY + GH/2 - 12, p1.y + e.movementY));
    });
    window.addEventListener('mousedown', e => {
        if(gameActive) area4.g = Math.max(0, area4.g - 20);
    });

    document.getElementById('save-btn').onclick = async () => {
        const nick = document.getElementById('nickname').value.trim() || "익명";
        await addDoc(collection(db, "dodge_rankings"), { diff: currentDiff, name: nick, score: score, timestamp: serverTimestamp() });
        location.reload();
    };
</script>
</body>
</html>
